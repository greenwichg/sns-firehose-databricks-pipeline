resources:
  jobs:
    # -----------------------------------------------
    # Gold Layer — Views & Permissions
    # -----------------------------------------------
    gold_views_pipeline:
      name: "[${var.environment}] Gold - Views & Permissions"
      description: "Create/refresh gold layer views and apply Unity Catalog permissions"
      schedule:
        quartz_cron_expression: "0 0 1 * * ?"  # Daily at 1:00 AM UTC
        timezone_id: "UTC"
      tags:
        layer: "gold"
        environment: ${var.environment}
      job_clusters:
        - job_cluster_key: "gold_cluster"
          new_cluster:
            spark_version: "14.3.x-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: 1
      tasks:
        - task_key: "create_views_and_permissions"
          job_cluster_key: "gold_cluster"
          notebook_task:
            notebook_path: "../src/gold/create_views.py"
            base_parameters:
              environment: ${var.environment}
              catalog_name: ${var.catalog_name}
          depends_on: []

    # -----------------------------------------------
    # Full Pipeline — End-to-End Orchestration
    # -----------------------------------------------
    full_pipeline:
      name: "[${var.environment}] Full Pipeline - Bronze to Gold"
      description: "End-to-end pipeline: Bronze ingestion -> Silver processing -> Gold views"
      tags:
        layer: "all"
        environment: ${var.environment}
      job_clusters:
        - job_cluster_key: "pipeline_cluster"
          new_cluster:
            spark_version: "14.3.x-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: 3
            aws_attributes:
              instance_profile_arn: "arn:aws:iam::222222222222:instance-profile/databricks-s3-access"
            spark_conf:
              "spark.databricks.delta.schema.autoMerge.enabled": "true"
              "spark.databricks.delta.optimizeWrite.enabled": "true"
      tasks:
        # Bronze tasks (parallel)
        - task_key: "bronze_orders"
          job_cluster_key: "pipeline_cluster"
          notebook_task:
            notebook_path: "../src/bronze/autoloader_ingestion.py"
            base_parameters:
              topic_name: "orders"
              environment: ${var.environment}
              landing_bucket: ${var.landing_bucket}
              catalog_name: ${var.catalog_name}

        - task_key: "bronze_customers"
          job_cluster_key: "pipeline_cluster"
          notebook_task:
            notebook_path: "../src/bronze/autoloader_ingestion.py"
            base_parameters:
              topic_name: "customers"
              environment: ${var.environment}
              landing_bucket: ${var.landing_bucket}
              catalog_name: ${var.catalog_name}

        - task_key: "bronze_products"
          job_cluster_key: "pipeline_cluster"
          notebook_task:
            notebook_path: "../src/bronze/autoloader_ingestion.py"
            base_parameters:
              topic_name: "products"
              environment: ${var.environment}
              landing_bucket: ${var.landing_bucket}
              catalog_name: ${var.catalog_name}

        # Silver tasks (depend on bronze)
        - task_key: "silver_fact_orders"
          depends_on:
            - task_key: "bronze_orders"
          job_cluster_key: "pipeline_cluster"
          notebook_task:
            notebook_path: "../src/silver/fact_orders.py"
            base_parameters:
              environment: ${var.environment}
              catalog_name: ${var.catalog_name}

        - task_key: "silver_dim_customers"
          depends_on:
            - task_key: "bronze_customers"
          job_cluster_key: "pipeline_cluster"
          notebook_task:
            notebook_path: "../src/silver/dim_customers.py"
            base_parameters:
              environment: ${var.environment}
              catalog_name: ${var.catalog_name}
              salt_secret_scope: ${var.salt_secret_scope}
              salt_secret_key: ${var.salt_secret_key}

        - task_key: "silver_dim_products"
          depends_on:
            - task_key: "bronze_products"
          job_cluster_key: "pipeline_cluster"
          notebook_task:
            notebook_path: "../src/silver/dim_products.py"
            base_parameters:
              environment: ${var.environment}
              catalog_name: ${var.catalog_name}
              salt_secret_scope: ${var.salt_secret_scope}
              salt_secret_key: ${var.salt_secret_key}

        # Gold tasks (depend on all silver)
        - task_key: "gold_views"
          depends_on:
            - task_key: "silver_fact_orders"
            - task_key: "silver_dim_customers"
            - task_key: "silver_dim_products"
          job_cluster_key: "pipeline_cluster"
          notebook_task:
            notebook_path: "../src/gold/create_views.py"
            base_parameters:
              environment: ${var.environment}
              catalog_name: ${var.catalog_name}
